name: piza-front
region: syd

services:
  - name: web
    github:
      repo: Ali-oss-cell/piza-front
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: node-js
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://api.marinapizzas.com.au/api
        scope: RUN_AND_BUILD_TIME

domains:
  - domain: marinapizzas.com.au
    type: PRIMARY
  - domain: www.marinapizzas.com.au
    type: ALIAS
